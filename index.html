<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- PWA Core Meta -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#09090B" />
  <meta name="color-scheme" content="dark" />
  <meta name="description"
    content="100% free, local-first carousel generator. Design stunning social media carousels in seconds — no signup, no watermarks, no cloud." />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/Logo.png" />

  <!-- iOS / Apple PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Carousel" />
  <link rel="apple-touch-icon" href="/Logo.png" />

  <!-- MS Tile (Windows) -->
  <meta name="msapplication-TileColor" content="#09090B" />
  <meta name="msapplication-TileImage" content="/Logo.png" />

  <!-- Open Graph / Social Sharing -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Carousel Architect — Fast & Clean" />
  <meta property="og:description"
    content="100% free, local-first carousel generator. Design stunning social media carousels in seconds." />
  <meta property="og:image" content="/Logo.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Carousel Architect — Fast & Clean" />

  <!-- Prevent phone number detection on iOS -->
  <meta name="format-detection" content="telephone=no" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Outfit:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
    rel="stylesheet">

  <title>Carousel Architect | Fast & Clean</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
